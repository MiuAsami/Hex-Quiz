<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEX QUIZ — Color Code Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080b0f;
    --surface: #0f1318;
    --border: #1e2530;
    --border-lit: #2e3d50;
    --text: #c8d4e0;
    --text-dim: #4a5a6a;
    --accent: #3d9eff;
    --accent-glow: rgba(61,158,255,0.18);
    --correct: #2ecc8a;
    --correct-glow: rgba(46,204,138,0.18);
    --wrong: #ff5757;
    --wrong-glow: rgba(255,87,87,0.18);
    --purple: #b47fff;
    --purple-glow: rgba(180,127,255,0.18);
    --mono: 'Share Tech Mono', monospace;
    --display: 'Bebas Neue', sans-serif;
    --body: 'Barlow', sans-serif;
    --card-pad: clamp(14px, 4vw, 28px);
    --hex-cell: clamp(30px, 8vw, 42px);
    --hex-font: clamp(18px, 5vw, 30px);
    --hash-font: clamp(20px, 5.5vw, 36px);
    --name-font: clamp(20px, 5vw, 28px);
    --btn-h: clamp(40px, 10vw, 46px);
    --btn-font: clamp(11px, 2.5vw, 13px);
    --swatch-h: clamp(110px, 22vw, 180px);
    --mode-btn-size: clamp(32px, 9vw, 38px);
    --mode-font: clamp(12px, 3vw, 14px);
    --header-pad: clamp(10px, 3vw, 14px) clamp(14px, 5vw, 28px);
  }

  html { height: 100%; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

  body {
    min-height: 100%; height: 100%;
    background: var(--bg); color: var(--text); font-family: var(--body);
    overflow-y: auto; overflow-x: hidden;
    padding-bottom: env(safe-area-inset-bottom);
  }

  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(61,158,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(61,158,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  #app {
    position: relative; z-index: 1; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: clamp(70px,14vw,80px) 12px clamp(70px,14vw,80px);
  }

  /* HEADER */
  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: var(--header-pad);
    padding-top: calc(env(safe-area-inset-top) + clamp(10px,3vw,14px));
    border-bottom: 1px solid var(--border);
    background: rgba(8,11,15,0.92);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  .logo { font-family: var(--display); font-size: clamp(18px,5vw,22px); letter-spacing: 3px; color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); }
  .logo span { color: var(--text-dim); }
  .header-right { display: flex; align-items: center; gap: 14px; }
  .streak-badge { font-family: var(--mono); font-size: clamp(10px,2.5vw,12px); color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
  .streak-badge b { font-size: clamp(15px,4vw,18px); color: var(--correct); text-shadow: 0 0 12px var(--correct-glow); }
  .streak-badge b.pop { animation: pop 0.3s ease; }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.5)} 100%{transform:scale(1)} }

  /* TOGGLE */
  .toggle-wrap { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; touch-action: manipulation; }
  .toggle-label { font-family: var(--mono); font-size: clamp(9px,2.2vw,11px); color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; }
  .toggle-track { position: relative; width: 34px; height: 19px; border-radius: 10px; background: var(--border-lit); border: 1px solid var(--border-lit); transition: background 0.25s, border-color 0.25s; flex-shrink: 0; }
  .toggle-thumb { position: absolute; top: 2px; left: 2px; width: 13px; height: 13px; border-radius: 50%; background: var(--text-dim); transition: transform 0.25s, background 0.25s; }
  .toggle-wrap.on .toggle-track { background: var(--accent-glow); border-color: var(--accent); }
  .toggle-wrap.on .toggle-thumb { transform: translateX(15px); background: var(--accent); box-shadow: 0 0 8px rgba(61,158,255,0.5); }

  /* MODE BAR */
  .mode-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    display: flex; flex-direction: column; align-items: center;
    gap: clamp(5px,1.2vw,8px);
    padding: clamp(8px,2.5vw,12px) clamp(10px,4vw,28px);
    padding-bottom: calc(env(safe-area-inset-bottom) + clamp(8px,2.5vw,12px));
    border-top: 1px solid var(--border);
    background: rgba(8,11,15,0.92);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  .mode-bar-row { display: flex; align-items: center; justify-content: center; gap: clamp(5px,1.5vw,8px); width: 100%; }
  .mode-bar-row + .mode-bar-row { border-top: 1px solid var(--border); padding-top: clamp(5px,1.2vw,8px); }
  .mode-label { font-family: var(--mono); font-size: clamp(9px,2.2vw,11px); color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-right: 2px; white-space: nowrap; }
  .mode-btn {
    width: var(--mode-btn-size); height: var(--mode-btn-size);
    border-radius: 6px; border: 1px solid var(--border); background: var(--surface);
    color: var(--text-dim); font-family: var(--mono); font-size: var(--mode-font);
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    touch-action: manipulation;
  }
  .mode-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
  .mode-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); box-shadow: 0 0 16px var(--accent-glow); }
  .guess-btn {
    height: var(--mode-btn-size); padding: 0 clamp(10px,3vw,16px);
    border-radius: 6px; border: 1px solid var(--border); background: var(--surface);
    color: var(--text-dim); font-family: var(--mono); font-size: var(--mode-font);
    cursor: pointer; transition: all 0.2s; letter-spacing: 1px;
    display: flex; align-items: center; justify-content: center;
    touch-action: manipulation;
  }
  .guess-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
  .guess-btn.active-hex  { border-color: var(--accent);  color: var(--accent);  background: var(--accent-glow);  box-shadow: 0 0 16px var(--accent-glow); }
  .guess-btn.active-name { border-color: var(--purple);  color: var(--purple);  background: var(--purple-glow);  box-shadow: 0 0 16px var(--purple-glow); }

  /* GAME CARD */
  .game-card {
    width: 100%; max-width: 480px;
    border: 1px solid var(--border); border-radius: clamp(10px,3vw,16px);
    background: var(--surface); overflow: hidden;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    animation: slideIn 0.35s cubic-bezier(0.22,1,0.36,1);
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .swatch { height: var(--swatch-h); position: relative; transition: background-color 0.4s ease; overflow: hidden; }
  .swatch::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.4) 100%); }
  .card-body { padding: var(--card-pad); }
  .color-name { font-family: var(--display); font-size: var(--name-font); letter-spacing: 2px; color: var(--text); margin-bottom: 4px; line-height: 1.1; word-break: break-word; min-height: 1.2em; }
  .color-index { font-family: var(--mono); font-size: clamp(9px,2.2vw,11px); color: var(--text-dim); margin-bottom: clamp(14px,4vw,24px); cursor: pointer; text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 3px; }

  /* HEX DISPLAY */
  .hex-display { display: flex; align-items: center; margin-bottom: clamp(14px,4vw,24px); min-width: 0; }
  .hex-hash { font-family: var(--mono); font-size: var(--hash-font); color: var(--text-dim); margin-right: clamp(2px,0.8vw,4px); line-height: 1; flex-shrink: 0; }
  .hex-chars { display: flex; gap: clamp(2px,1vw,4px); align-items: center; flex-wrap: nowrap; }
  .hex-char {
    width: var(--hex-cell); height: calc(var(--hex-cell) * 1.24);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: var(--hex-font); font-weight: bold;
    color: var(--text); background: rgba(255,255,255,0.04);
    border: 1px solid var(--border); border-radius: clamp(4px,1.2vw,6px);
    line-height: 1; text-transform: uppercase; flex-shrink: 0;
  }
  .hex-input {
    width: var(--hex-cell); height: calc(var(--hex-cell) * 1.24);
    background: rgba(61,158,255,0.07); border: 1.5px solid var(--accent);
    border-radius: clamp(4px,1.2vw,6px);
    font-family: var(--mono); font-size: max(16px, var(--hex-font)); font-weight: bold;
    color: var(--accent); text-align: center; text-transform: uppercase;
    outline: none; caret-color: transparent;
    box-shadow: 0 0 12px rgba(61,158,255,0.12);
    padding: 0; flex-shrink: 0; transition: all 0.15s;
    touch-action: manipulation; -webkit-appearance: none; appearance: none;
  }
  .hex-input:focus   { border-color: #6eb8ff; box-shadow: 0 0 0 3px rgba(61,158,255,0.18); }
  .hex-input.correct { background: var(--correct-glow); border-color: var(--correct); color: var(--correct); box-shadow: 0 0 12px var(--correct-glow); }
  .hex-input.wrong   { background: var(--wrong-glow);   border-color: var(--wrong);   color: var(--wrong);   box-shadow: 0 0 12px var(--wrong-glow); }
  .hex-input.revealed{ background: rgba(255,255,255,0.05); border-color: var(--border-lit); color: var(--text); }

  /* NAME MODE */
  .name-guess-wrap { margin-bottom: clamp(14px,4vw,24px); }
  .name-parts { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 10px; }
  .name-visible { font-family: var(--display); font-size: var(--name-font); letter-spacing: 2px; color: var(--text); line-height: 1.1; }
  .name-input {
    font-family: var(--mono); font-size: clamp(14px,3.5vw,18px);
    background: var(--purple-glow); border: 1.5px solid var(--purple);
    border-radius: 8px; color: var(--purple); padding: 6px 12px;
    outline: none; caret-color: var(--purple);
    box-shadow: 0 0 12px rgba(180,127,255,0.1);
    min-width: 120px; max-width: 100%;
    touch-action: manipulation; -webkit-appearance: none; appearance: none;
    transition: all 0.15s;
  }
  .name-input:focus   { border-color: #d4aaff; box-shadow: 0 0 0 3px var(--purple-glow); }
  .name-input.correct { background: var(--correct-glow); border-color: var(--correct); color: var(--correct); box-shadow: 0 0 12px var(--correct-glow); }
  .name-input.wrong   { background: var(--wrong-glow);   border-color: var(--wrong);   color: var(--wrong);   box-shadow: 0 0 12px var(--wrong-glow); }
  .name-input.revealed{ background: rgba(255,255,255,0.05); border-color: var(--border-lit); color: var(--text); font-family: var(--display); font-size: var(--name-font); letter-spacing: 2px; }
  .hex-full { display: flex; align-items: center; margin-bottom: clamp(14px,4vw,24px); opacity: 0.5; }
  .hex-full-hash  { font-family: var(--mono); font-size: var(--hash-font); color: var(--text-dim); margin-right: 4px; line-height: 1; }
  .hex-full-value { font-family: var(--mono); font-size: var(--hash-font); color: var(--text); letter-spacing: 2px; line-height: 1; font-weight: bold; }

  /* FEEDBACK */
  .feedback { min-height: 28px; display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: clamp(10px,2.5vw,12px); margin-bottom: clamp(10px,3vw,16px); opacity: 0; transform: translateY(4px); transition: opacity 0.2s, transform 0.2s; word-break: break-all; }
  .feedback.show { opacity: 1; transform: translateY(0); }
  .feedback.correct-msg { color: var(--correct); }
  .feedback.wrong-msg   { color: var(--wrong); }
  .feedback-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

  /* BUTTONS */
  .btn-row { display: flex; gap: clamp(6px,2vw,10px); }
  .btn {
    flex: 1; height: var(--btn-h); border-radius: clamp(6px,2vw,8px); border: none;
    font-family: var(--mono); font-size: var(--btn-font); letter-spacing: clamp(1px,0.5vw,2px);
    text-transform: uppercase; cursor: pointer; transition: all 0.18s;
    position: relative; overflow: hidden; touch-action: manipulation;
  }
  .btn::after { content: ''; position: absolute; inset: 0; background: rgba(255,255,255,0); transition: background 0.15s; }
  .btn:hover::after  { background: rgba(255,255,255,0.06); }
  .btn:active::after { background: rgba(255,255,255,0.12); }
  .btn-enter { background: var(--accent);  color: #000; font-weight: bold; box-shadow: 0 0 20px rgba(61,158,255,0.3); }
  .btn-enter:hover { box-shadow: 0 0 28px rgba(61,158,255,0.45); }
  .btn-next  { background: var(--correct); color: #000; font-weight: bold; box-shadow: 0 0 20px var(--correct-glow); }
  .btn-next:hover { box-shadow: 0 0 28px rgba(46,204,138,0.4); }
  .btn-skip  { background: transparent; border: 1px solid var(--border-lit); color: var(--text-dim); flex: 0 0 auto; width: clamp(60px,18vw,80px); }
  .btn-skip:hover { border-color: var(--text-dim); color: var(--text); }

  /* HINT */
  .hint { text-align: center; font-size: clamp(9px,2.2vw,11px); color: var(--text-dim); font-family: var(--mono); margin-top: clamp(8px,2.5vw,14px); letter-spacing: 1px; }
  .hint kbd { background: var(--border); border: 1px solid var(--border-lit); border-radius: 3px; padding: 1px 5px; font-family: var(--mono); font-size: clamp(8px,2vw,10px); }

  /* COLOR LIST MODAL */
  .modal-backdrop {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.72); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center; padding: 12px;
    opacity: 0; pointer-events: none; transition: opacity 0.22s ease;
  }
  .modal-backdrop.open { opacity: 1; pointer-events: all; }
  .modal {
    width: 100%; max-width: 520px; max-height: 82vh;
    background: var(--surface); border: 1px solid var(--border-lit);
    border-radius: clamp(10px,3vw,16px); overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 32px 80px rgba(0,0,0,0.7);
    transform: translateY(16px); transition: transform 0.22s cubic-bezier(0.22,1,0.36,1);
  }
  .modal-backdrop.open .modal { transform: translateY(0); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .modal-title { font-family: var(--display); font-size: clamp(16px,4vw,20px); letter-spacing: 2px; color: var(--text); }
  .modal-close { width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--border-lit); background: transparent; color: var(--text-dim); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; touch-action: manipulation; }
  .modal-close:hover { border-color: var(--wrong); color: var(--wrong); }
  .modal-stats { display: flex; gap: 16px; padding: 10px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; }
  .modal-stat { font-family: var(--mono); font-size: 11px; display: flex; align-items: center; gap: 6px; color: var(--text-dim); }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .stat-dot.unseen  { background: var(--border-lit); }
  .stat-dot.correct { background: var(--correct); }
  .stat-dot.wrong   { background: var(--wrong); }
  .modal-list { overflow-y: auto; flex: 1; padding: 8px 12px 12px; overscroll-behavior: contain; }
  .modal-list::-webkit-scrollbar { width: 4px; }
  .modal-list::-webkit-scrollbar-thumb { background: var(--border-lit); border-radius: 2px; }
  .color-row { display: flex; align-items: center; gap: 10px; padding: 6px 8px; border-radius: 6px; border: 1px solid transparent; transition: background 0.12s; }
  .color-row:hover { background: rgba(255,255,255,0.03); }
  .color-row.current-row { background: rgba(61,158,255,0.07); border-color: rgba(61,158,255,0.2); }
  .row-swatch { width: 28px; height: 28px; border-radius: 5px; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.08); }
  .row-info { flex: 1; min-width: 0; }
  .row-name { font-family: var(--mono); font-size: 11px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row-hex  { font-family: var(--mono); font-size: 10px; color: var(--text-dim); margin-top: 1px; }
  .row-badge { font-family: var(--mono); font-size: 9px; letter-spacing: 1px; text-transform: uppercase; padding: 2px 7px; border-radius: 4px; flex-shrink: 0; }
  .row-badge.correct { background: var(--correct-glow); color: var(--correct); border: 1px solid var(--correct); }
  .row-badge.wrong   { background: var(--wrong-glow);   color: var(--wrong);   border: 1px solid var(--wrong); }
  .row-badge.current { background: var(--accent-glow);  color: var(--accent);  border: 1px solid var(--accent); }
  .row-badge.unseen  { display: none; }
  .row-num { font-family: var(--mono); font-size: 10px; color: var(--text-dim); width: 24px; text-align: right; flex-shrink: 0; }

  /* RESPONSIVE */
  @media (min-width: 600px) { :root { --swatch-h: 180px; --hex-cell: 42px; --hex-font: 30px; } }
  @media (max-width: 360px) {
    :root { --hex-cell: 28px; --hex-font: 16px; --hash-font: 18px; --swatch-h: 100px; }
    .hex-chars { gap: 2px; }
  }
  @media (max-height: 500px) and (orientation: landscape) {
    :root { --swatch-h: 80px; }
    .game-card { display: flex; flex-direction: row; max-width: 700px; }
    .swatch { width: 140px; height: auto; flex-shrink: 0; }
    .card-body { flex: 1; padding: 14px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">HEX<span>QUIZ</span></div>
  <div class="header-right">
    <div class="toggle-wrap on" id="autoToggle" onclick="toggleAutoAdvance()" title="Auto-advance after correct">
      <span class="toggle-label">AUTO</span>
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
    </div>
    <div class="streak-badge">STREAK <b id="streak">0</b></div>
  </div>
</header>

<div id="app">
  <div class="game-card">
    <div class="swatch" id="swatch"></div>
    <div class="card-body">
      <div class="color-name" id="colorName">—</div>
      <div class="color-index" id="colorIndex" onclick="openColorList()" title="View all colors">Color 0 of 103 ↗</div>
      <div class="hex-display" id="hexDisplay">
        <div class="hex-hash">#</div>
        <div class="hex-chars" id="hexChars"></div>
      </div>
      <div id="nameGuessWrap" class="name-guess-wrap" style="display:none;"></div>
      <div class="feedback" id="feedback">
        <div class="feedback-dot"></div>
        <span id="feedbackText"></span>
      </div>
      <div class="btn-row" id="btnRow">
        <button class="btn btn-skip" onclick="skipRound()">SKIP</button>
        <button class="btn btn-enter" onclick="checkAnswer()">ENTER</button>
      </div>
    </div>
  </div>
  <div class="hint" id="hintText">
    Type in the <kbd>_</kbd> blanks &middot; <kbd>Enter</kbd> to submit
  </div>
</div>

<div class="mode-bar">
  <div class="mode-bar-row">
    <span class="mode-label">Guess:</span>
    <button class="guess-btn active-hex" id="guess-hex"  onclick="setGuessMode('hex')">HEX</button>
    <button class="guess-btn"            id="guess-name" onclick="setGuessMode('name')">NAME</button>
  </div>
  <div class="mode-bar-row" id="hex-mode-row">
    <span class="mode-label">Missing:</span>
    <button class="mode-btn active" id="mode-1" onclick="setMode(1)">1</button>
    <button class="mode-btn"        id="mode-2" onclick="setMode(2)">2</button>
    <button class="mode-btn"        id="mode-3" onclick="setMode(3)">3</button>
    <button class="mode-btn"        id="mode-4" onclick="setMode(4)">4</button>
    <button class="mode-btn"        id="mode-5" onclick="setMode(5)">5</button>
    <button class="mode-btn"        id="mode-6" onclick="setMode(6)">6</button>
  </div>
  <div class="mode-bar-row" id="name-mode-row" style="display:none;">
    <span class="mode-label">Hide:</span>
    <span style="font-family:var(--mono);font-size:clamp(9px,2.2vw,11px);color:var(--text-dim);letter-spacing:1px;">RANDOM L/R</span>
    <div class="toggle-wrap" id="bothToggle" onclick="toggleBothMode()" title="Always hide full name">
      <span class="toggle-label">BOTH</span>
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="colorModal" onclick="handleBackdropClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">COLOR LIST</div>
      <button class="modal-close" onclick="closeColorList()">&#x2715;</button>
    </div>
    <div class="modal-stats">
      <div class="modal-stat"><div class="stat-dot correct"></div><span id="statCorrect">0 correct</span></div>
      <div class="modal-stat"><div class="stat-dot wrong"></div><span id="statWrong">0 incorrect</span></div>
      <div class="modal-stat"><div class="stat-dot unseen"></div><span id="statUnseen">103 unseen</span></div>
    </div>
    <div class="modal-list" id="colorList"></div>
  </div>
</div>

<script>
const COLORS = [
  {hex:'000000',name:'Black (W3C)'},{hex:'0D031B',name:'Purple Obsidian'},
  {hex:'040720',name:'Black Blue'},{hex:'0C090A',name:'Night'},
  {hex:'1C1C1C',name:'Obsidian'},{hex:'282224',name:'Dark Plum'},
  {hex:'34282C',name:'Charcoal'},{hex:'3B3131',name:'Oil'},
  {hex:'343434',name:'Jet Black'},{hex:'3A3B3C',name:'Stormy Gray'},
  {hex:'3C4142',name:'Charcoal Gray'},{hex:'454545',name:'Light Black'},
  {hex:'4D4D4F',name:'Dark Steampunk'},{hex:'413839',name:'Black Cat'},
  {hex:'3D3C3A',name:'Iridium'},{hex:'463E3F',name:'Black Eel'},
  {hex:'4C4646',name:'Black Cow'},{hex:'504A4B',name:'Gray Wolf'},
  {hex:'565051',name:'Vampire Gray'},{hex:'52595D',name:'Iron Gray'},
  {hex:'5C5858',name:'Gray Dolphin'},{hex:'625D5D',name:'Carbon Gray'},
  {hex:'666362',name:'Ash Gray'},{hex:'696969',name:'DimGray (W3C)'},
  {hex:'686A6C',name:'Nardo Gray'},{hex:'6D6968',name:'Cloudy Gray'},
  {hex:'726E6D',name:'Smokey Gray'},{hex:'736F6E',name:'Alien Gray'},
  {hex:'757575',name:'Sonic Silver'},{hex:'797979',name:'Platinum Gray'},
  {hex:'837E7C',name:'Granite'},{hex:'808080',name:'Gray (W3C)'},
  {hex:'848482',name:'Battleship Gray'},{hex:'888B90',name:'Sheet Metal'},
  {hex:'8C8C8C',name:'Dark Gainsboro'},{hex:'8D918D',name:'Gunmetal Gray'},
  {hex:'9B9A96',name:'Cold Metal'},{hex:'99A3A3',name:'Stainless Steel Gray'},
  {hex:'A9A9A9',name:'DarkGray (W3C)'},{hex:'A8A9AD',name:'Chrome Aluminum'},
  {hex:'B6B6B4',name:'Gray Cloud'},{hex:'B6B6B6',name:'Metal'},
  {hex:'C0C0C0',name:'Silver (W3C)'},{hex:'C9C1C1',name:'Steampunk'},
  {hex:'C9C0BB',name:'Pale Silver'},{hex:'C0C6C7',name:'Gear Steel Gray'},
  {hex:'D1D0CE',name:'Gray Goose'},{hex:'CECECE',name:'Platinum Silver'},
  {hex:'D3D3D3',name:'LightGray (W3C)'},{hex:'DADBD0',name:'Silver White'},
  {hex:'DCDCDC',name:'Gainsboro (W3C)'},{hex:'E0E5E5',name:'Light Steel Gray'},
  {hex:'F5F5F5',name:'WhiteSmoke (W3C)'},{hex:'EEEEEE',name:'White Gray'},
  {hex:'E5E4E2',name:'Platinum'},{hex:'BCC6CC',name:'Metallic Silver'},
  {hex:'98AFC7',name:'Blue Gray'},{hex:'838996',name:'Roman Silver'},
  {hex:'778899',name:'LightSlateGray (W3C)'},{hex:'708090',name:'SlateGray (W3C)'},
  {hex:'6D7B8D',name:'Rat Gray'},{hex:'657383',name:'Slate Granite Gray'},
  {hex:'616D7E',name:'Jet Gray'},{hex:'646D7E',name:'Mist Blue'},
  {hex:'6E7F80',name:'Dusty Blue'},{hex:'71797E',name:'Steel Gray'},
  {hex:'566D7E',name:'Marble Blue'},{hex:'737CA1',name:'Slate Blue Gray'},
  {hex:'728FCE',name:'Light Purple Blue'},{hex:'4863A0',name:'Azure Blue'},
  {hex:'3D5791',name:'Monte Carlo Blue'},{hex:'2F539B',name:'Estoril Blue'},
  {hex:'2E5090',name:'YInMn Blue'},{hex:'2B547E',name:'Blue Jay'},
  {hex:'36454F',name:'Charcoal Blue'},{hex:'29465B',name:'Dark Blue Gray'},
  {hex:'2B3856',name:'Dark Slate'},{hex:'123456',name:'Deep Sea Blue'},
  {hex:'003366',name:'Midnight Navy'},{hex:'151B54',name:'Night Blue'},
  {hex:'191970',name:'MidnightBlue (W3C)'},{hex:'000080',name:'Navy (W3C)'},
  {hex:'151B8D',name:'Denim Dark Blue'},{hex:'00008B',name:'DarkBlue (W3C)'},
  {hex:'15317E',name:'Lapis Blue'},{hex:'0000A0',name:'New Midnight Blue'},
  {hex:'0000A5',name:'Earth Blue'},
  {hex:'FF0000',name:'Red'},{hex:'FFFFFF',name:'White'},
  {hex:'00FFFF',name:'Cyan'},{hex:'0000FF',name:'Blue'},
  {hex:'ADD8E6',name:'Light Blue'},{hex:'FFA500',name:'Orange'},
  {hex:'800080',name:'Purple'},{hex:'A52A2A',name:'Brown'},
  {hex:'FFFF00',name:'Yellow'},{hex:'800000',name:'Maroon'},
  {hex:'00FF00',name:'Lime'},{hex:'008000',name:'Green'},
  {hex:'FF00FF',name:'Magenta'},{hex:'808000',name:'Olive'},
  {hex:'FFC0CB',name:'Pink'},{hex:'7FFFD4',name:'Aquamarine'}
];

// ── STATE ──
let currentMode       = 1;
let currentColor      = null;
let missingPositions  = [];
let gameState         = 'playing';
let streak            = 0;
let colorQueue        = [];
let autoAdvance       = true;
let autoAdvanceTimer  = null;
let guessMode         = 'hex';
let bothModeOn        = false;
let currentNameSide   = 'left';
let currentHiddenPart = '';
const colorHistory    = {};

// ── UTILS ──
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function getNextColor() {
  if (!colorQueue.length) colorQueue = shuffleArray(COLORS);
  return colorQueue.pop();
}
function getRandomPositions(count) {
  return shuffleArray([0,1,2,3,4,5]).slice(0, count).sort((a,b) => a - b);
}

// ── CONTROLS ──
function setMode(m) {
  currentMode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mode-' + m).classList.add('active');
  newRound();
}
function setGuessMode(mode) {
  guessMode = mode;
  document.getElementById('guess-hex').className  = 'guess-btn' + (mode === 'hex'  ? ' active-hex'  : '');
  document.getElementById('guess-name').className = 'guess-btn' + (mode === 'name' ? ' active-name' : '');
  document.getElementById('hex-mode-row').style.display  = mode === 'hex'  ? '' : 'none';
  document.getElementById('name-mode-row').style.display = mode === 'name' ? '' : 'none';
  newRound();
}
function toggleAutoAdvance() {
  autoAdvance = !autoAdvance;
  document.getElementById('autoToggle').classList.toggle('on', autoAdvance);
  if (!autoAdvance && autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
}
function toggleBothMode() {
  bothModeOn = !bothModeOn;
  document.getElementById('bothToggle').classList.toggle('on', bothModeOn);
  newRound();
}

// ── ROUND ──
function newRound() {
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  currentColor = getNextColor();
  if (guessMode === 'hex') missingPositions = getRandomPositions(currentMode);
  gameState = 'playing';
  render();
}
function skipRound() {
  streak = 0; updateStreak();
  newRound();
}

// ── RENDER ──
function render() {
  const c = currentColor;
  document.getElementById('swatch').style.backgroundColor = '#' + c.hex;
  document.getElementById('colorIndex').textContent =
    'Color ' + (COLORS.indexOf(c)+1) + ' of ' + COLORS.length +
    ' \u00b7 ' + (guessMode === 'hex' ? 'Mode ' + currentMode : 'Name \u00b7 ' + (bothModeOn ? 'BOTH' : 'RANDOM')) + ' \u2197';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('btnRow').innerHTML =
    '<button class="btn btn-skip" onclick="skipRound()">SKIP</button>' +
    '<button class="btn btn-enter" onclick="checkAnswer()">ENTER</button>';
  if (guessMode === 'hex') renderHex(c);
  else renderName(c);
}

function renderHex(c) {
  document.getElementById('colorName').textContent = c.name.toUpperCase();
  document.getElementById('hexDisplay').style.display = '';
  document.getElementById('nameGuessWrap').style.display = 'none';

  const hexChars = document.getElementById('hexChars');
  hexChars.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    if (missingPositions.includes(i)) {
      const inp = document.createElement('input');
      inp.type = 'text'; inp.maxLength = 1; inp.className = 'hex-input';
      inp.id = 'inp-' + i; inp.autocomplete = 'off'; inp.spellcheck = false;
      inp.addEventListener('input', (function(idx){ return function(e) {
        const v = e.target.value.replace(/[^0-9a-fA-F]/g, '');
        e.target.value = v.slice(-1).toUpperCase();
        if (v) advanceFocus(idx);
      }; })(i));
      inp.addEventListener('keydown', (function(idx){ return function(e) {
        if (e.key === 'Enter') checkAnswer();
        if (e.key === 'Backspace' && !e.target.value) retreatFocus(idx);
        if (e.key === 'ArrowLeft')  retreatFocus(idx);
        if (e.key === 'ArrowRight') advanceFocus(idx);
      }; })(i));
      inp.addEventListener('focus', function(e){ e.target.select(); });
      hexChars.appendChild(inp);
    } else {
      const span = document.createElement('div');
      span.className = 'hex-char known';
      span.textContent = c.hex[i].toUpperCase();
      hexChars.appendChild(span);
    }
  }
  document.getElementById('hintText').innerHTML = 'Type in the <kbd>_</kbd> blanks &middot; <kbd>Enter</kbd> to submit';
  setTimeout(function(){ const el = document.getElementById('inp-' + missingPositions[0]); if (el) el.focus(); }, 50);
}

function renderName(c) {
  document.getElementById('colorName').textContent = '';
  document.getElementById('hexDisplay').style.display = 'none';

  const ng = document.getElementById('nameGuessWrap');
  ng.style.display = '';

  const parts = getNameParts(c.name);
  currentHiddenPart = parts.hidden;

  var inputHTML = '<input class="name-input" id="nameInput" type="text" placeholder="???" autocomplete="off" spellcheck="false">';
  var visibleHTML = parts.shown ? '<span class="name-visible">' + parts.shown.toUpperCase() + '</span>' : '';

  ng.innerHTML =
    '<div class="name-parts">' +
      (parts.hiddenFirst ? inputHTML + visibleHTML : visibleHTML + inputHTML) +
    '</div>' +
    '<div class="hex-full">' +
      '<div class="hex-full-hash">#</div>' +
      '<div class="hex-full-value">' + c.hex.toUpperCase() + '</div>' +
    '</div>';

  var inp = document.getElementById('nameInput');
  inp.addEventListener('keydown', function(e){ if (e.key === 'Enter') checkAnswer(); });
  document.getElementById('hintText').innerHTML = 'Type the missing name &middot; <kbd>Enter</kbd> to submit';
  setTimeout(function(){ inp.focus(); }, 50);
}

function getNameParts(name) {
  const words = name.split(' ');
  if (words.length === 1 || bothModeOn) {
    currentNameSide = 'both';
    return { hidden: name, shown: '', hiddenFirst: true };
  }
  currentNameSide = Math.random() < 0.5 ? 'left' : 'right';
  const mid = Math.ceil(words.length / 2);
  if (currentNameSide === 'left') {
    return { hidden: words.slice(0, mid).join(' '), shown: words.slice(mid).join(' '), hiddenFirst: true };
  } else {
    return { hidden: words.slice(mid).join(' '), shown: words.slice(0, mid).join(' '), hiddenFirst: false };
  }
}

// ── FOCUS HELPERS ──
function advanceFocus(pos) {
  const next = missingPositions.find(function(p){ return p > pos; });
  if (next !== undefined) { var el = document.getElementById('inp-' + next); if (el) el.focus(); }
}
function retreatFocus(pos) {
  const prev = missingPositions.slice().reverse().find(function(p){ return p < pos; });
  if (prev !== undefined) { var el = document.getElementById('inp-' + prev); if (el) el.focus(); }
}
function allHexFilled() {
  return missingPositions.every(function(p){
    var el = document.getElementById('inp-' + p);
    return el && el.value.trim().length === 1;
  });
}

// ── CHECK ──
function checkAnswer() {
  if (gameState === 'revealed') { newRound(); return; }
  if (guessMode === 'hex') checkHexAnswer();
  else checkNameAnswer();
}

function checkHexAnswer() {
  if (!allHexFilled()) { showFeedback('wrong', 'Fill in all blanks first!'); return; }
  var allCorrect = true;
  missingPositions.forEach(function(pos) {
    var inp = document.getElementById('inp-' + pos);
    var ok = inp.value.toUpperCase() === currentColor.hex[pos].toUpperCase();
    inp.classList.add(ok ? 'correct' : 'wrong');
    if (!ok) allCorrect = false;
  });
  if (allCorrect) {
    streak++; updateStreak();
    colorHistory[currentColor.hex] = 'correct';
    showFeedback('correct', 'Correct! #' + currentColor.hex.toUpperCase());
    document.getElementById('btnRow').innerHTML =
      '<button class="btn btn-skip" onclick="skipRound()">SKIP</button>' +
      '<button class="btn btn-next" onclick="newRound()">NEXT \u2192</button>';
    if (autoAdvance) autoAdvanceTimer = setTimeout(newRound, 4000);
  } else {
    streak = 0; updateStreak();
    colorHistory[currentColor.hex] = 'wrong';
    gameState = 'revealed';
    showFeedback('wrong', 'Incorrect \u2014 answer was #' + currentColor.hex.toUpperCase());
    missingPositions.forEach(function(pos) {
      var inp = document.getElementById('inp-' + pos);
      if (inp.classList.contains('wrong')) {
        inp.value = currentColor.hex[pos].toUpperCase();
        inp.classList.remove('wrong'); inp.classList.add('revealed');
      }
      inp.readOnly = true;
    });
    document.getElementById('btnRow').innerHTML =
      '<button class="btn btn-skip" onclick="skipRound()">SKIP</button>' +
      '<button class="btn btn-next" onclick="newRound()">PROCEED \u2192</button>';
  }
}

function checkNameAnswer() {
  var inp = document.getElementById('nameInput');
  if (!inp || !inp.value.trim()) { showFeedback('wrong', 'Type the missing name first!'); return; }
  var isCorrect = inp.value.trim().toLowerCase() === currentHiddenPart.toLowerCase();
  if (isCorrect) {
    streak++; updateStreak();
    colorHistory[currentColor.hex] = 'correct';
    inp.classList.add('correct'); inp.readOnly = true;
    showFeedback('correct', 'Correct! "' + currentColor.name + '"');
    document.getElementById('btnRow').innerHTML =
      '<button class="btn btn-skip" onclick="skipRound()">SKIP</button>' +
      '<button class="btn btn-next" onclick="newRound()">NEXT \u2192</button>';
    if (autoAdvance) autoAdvanceTimer = setTimeout(newRound, 4000);
  } else {
    streak = 0; updateStreak();
    colorHistory[currentColor.hex] = 'wrong';
    gameState = 'revealed';
    inp.classList.add('wrong'); inp.readOnly = true;
    showFeedback('wrong', 'Incorrect \u2014 it was "' + currentColor.name + '"');
    setTimeout(function(){
      inp.classList.remove('wrong'); inp.classList.add('revealed');
      inp.value = currentHiddenPart;
    }, 600);
    document.getElementById('btnRow').innerHTML =
      '<button class="btn btn-skip" onclick="skipRound()">SKIP</button>' +
      '<button class="btn btn-next" onclick="newRound()">PROCEED \u2192</button>';
  }
}

// ── UI HELPERS ──
function showFeedback(type, msg) {
  var fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (type === 'correct' ? 'correct-msg' : 'wrong-msg');
  document.getElementById('feedbackText').textContent = msg;
}
function updateStreak() {
  var el = document.getElementById('streak');
  el.textContent = streak;
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
}

// ── MODAL ──
function openColorList() {
  buildColorList();
  document.getElementById('colorModal').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(function(){
    var row = document.getElementById('modal-row-' + currentColor.hex);
    if (row) row.scrollIntoView({ block: 'center', behavior: 'smooth' });
  }, 80);
}
function closeColorList() {
  document.getElementById('colorModal').classList.remove('open');
  document.body.style.overflow = '';
}
function handleBackdropClick(e) {
  if (e.target === document.getElementById('colorModal')) closeColorList();
}
function buildColorList() {
  var list = document.getElementById('colorList');
  list.innerHTML = '';
  var nC = 0, nW = 0, nU = 0;
  COLORS.forEach(function(c, i) {
    var status = colorHistory[c.hex] || 'unseen';
    var isCurrent = currentColor && c.hex === currentColor.hex;
    if (status === 'correct') nC++;
    else if (status === 'wrong') nW++;
    else nU++;
    var badgeLabel = isCurrent ? 'NOW' : (status === 'unseen' ? '' : status.toUpperCase());
    var badgeClass = isCurrent ? 'current' : status;
    var row = document.createElement('div');
    row.className = 'color-row' + (isCurrent ? ' current-row' : '');
    row.id = 'modal-row-' + c.hex;
    row.innerHTML =
      '<div class="row-num">' + (i+1) + '</div>' +
      '<div class="row-swatch" style="background:#' + c.hex + '"></div>' +
      '<div class="row-info">' +
        '<div class="row-name">' + c.name + '</div>' +
        '<div class="row-hex">#' + c.hex.toUpperCase() + '</div>' +
      '</div>' +
      '<div class="row-badge ' + badgeClass + '">' + badgeLabel + '</div>';
    list.appendChild(row);
  });
  document.getElementById('statCorrect').textContent = nC + ' correct';
  document.getElementById('statWrong').textContent   = nW + ' incorrect';
  document.getElementById('statUnseen').textContent  = nU + ' unseen';
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeColorList();
  if (e.key === 'Enter') {
    var active = document.activeElement;
    if (active && (active.classList.contains('hex-input') || active.classList.contains('name-input'))) return;
    if (gameState === 'revealed') newRound();
  }
});

newRound();
</script>
